openapi: 3.0.3
info:
  title: LabFlow API
  description: |
    LabFlow 实验室管理系统 API 文档
    - Base URL: http://localhost:8000
    - 认证方式: JWT Token (HttpOnly Cookie)
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Development Server

paths:
  /api/v1/auth/login:
    post:
      summary: 用户登录
      description: 支持手机号或邮箱登录
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                phone:
                  type: string
                  description: 手机号（11位数字）
                  example: "13800138000"
                email:
                  type: string
                  description: 邮箱
                  example: "user@example.com"
                password:
                  type: string
                  description: 密码
                  example: "Password123!"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  token_type: bearer
        '400':
          description: 参数错误
          content:
            application/json:
              example:
                code: 400
                message: 请提供手机号或邮箱
                data: null

  /api/v1/auth/register:
    post:
      summary: 用户注册
      description: 注册新用户
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - phone
                - password
              properties:
                name:
                  type: string
                  maxLength: 30
                  description: 用户名（真实姓名）
                  example: 张三
                phone:
                  type: string
                  description: 手机号（11位数字）
                  example: "13800138000"
                email:
                  type: string
                  description: 邮箱（可选）
                  example: "user@example.com"
                password:
                  type: string
                  description: 密码（8-30位，需包含符号+字母+数字）
                  example: "Password123!"
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              example:
                code: 201
                message: success
                data:
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  token_type: bearer
        '400':
          description: 注册失败
          content:
            application/json:
              example:
                code: 400
                message: 该手机号已注册
                data: null

  /api/v1/auth/logout:
    post:
      summary: 用户登出
      description: 清除登录Cookie
      tags:
        - Auth
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              example:
                code: 200
                message: 已退出登录
                data: null

  /api/v1/users/me:
    get:
      summary: 获取当前用户信息
      description: 获取已登录用户的信息
      tags:
        - User
      security:
        - CookieAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  id: 1
                  name: 张三
                  phone: "13800138000"
                  email: "user@example.com"
                  role: 2
                  is_active: 0
                  created_at: "2024-01-15T10:30:00Z"
        '401':
          description: 未登录
          content:
            application/json:
              example:
                code: 401
                message: 未登录
                data: null
    put:
      summary: 更新当前用户信息
      description: 更新已登录用户的信息（不包括密码和角色）
      tags:
        - User
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/UserResponse'

  /api/v1/users:
    get:
      summary: 获取用户列表
      description: 获取用户列表（管理员专用）
      tags:
        - User
      security:
        - CookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
        - name: role
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
          description: 角色筛选 (0-超管, 1-管理员, 2-实验员)
        - name: is_active
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
          description: 状态筛选 (0-正常, 1-封禁, 2-注销)
        - name: keyword
          in: query
          schema:
            type: string
          description: 搜索关键词（姓名/手机/邮箱）
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  items:
                    - id: 1
                      name: 张三
                      phone: "13800138000"
                      email: "user@example.com"
                      role: 2
                      is_active: 0
                      created_at: "2024-01-15T10:30:00Z"
                  pagination:
                    page: 1
                    page_size: 20
                    total: 100
                    total_pages: 5
        '403':
          description: 权限不足

  /api/v1/users/{user_id}:
    get:
      summary: 获取用户详情
      description: 根据ID获取用户详情（管理员专用）
      tags:
        - User
      security:
        - CookieAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/UserResponse'
        '404':
          description: 用户不存在
    put:
      summary: 更新用户
      description: 更新用户信息（管理员专用，可修改角色和状态）
      tags:
        - User
      security:
        - CookieAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: 更新成功
        '403':
          description: 权限不足
        '404':
          description: 用户不存在

  /api/v1/labs:
    get:
      summary: 获取实验室列表
      description: 分页获取实验室列表
      tags:
        - Lab
      security:
        - CookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
        - name: status
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
          description: 实验室状态筛选 (0-正常, 1-维护, 2-停用)
        - name: tag_id
          in: query
          schema:
            type: integer
          description: 标签ID筛选
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  items:
                    - id: 1
                      name: 化学实验室 A
                      address: A 楼 302
                      capacity: 20
                      status: 0
                      tag_id: 1
                      description: 主要用于化学实验教学和科研
                      created_at: "2024-01-15T10:30:00Z"
                      updated_at: "2024-01-15T10:30:00Z"
                  pagination:
                    page: 1
                    page_size: 20
                    total: 10
                    total_pages: 1
    post:
      summary: 创建实验室
      description: 创建新实验室（管理员专用）
      tags:
        - Lab
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabCreate'
      responses:
        '201':
          description: 创建成功
        '403':
          description: 权限不足

  /api/v1/labs/{lab_id}:
    get:
      summary: 获取实验室详情
      description: 根据ID获取实验室详细信息
      tags:
        - Lab
      security:
        - CookieAuth: []
      parameters:
        - name: lab_id
          in: path
          required: true
          schema:
            type: integer
          description: 实验室ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  id: 1
                  name: 化学实验室 A
                  address: A 楼 302
                  capacity: 20
                  status: 0
                  tag_id: 1
                  description: 主要用于化学实验教学和科研
                  created_at: "2024-01-15T10:30:00Z"
                  updated_at: "2024-01-15T10:30:00Z"
        '404':
          description: 实验室不存在
    put:
      summary: 更新实验室
      description: 更新实验室信息（管理员专用）
      tags:
        - Lab
      security:
        - CookieAuth: []
      parameters:
        - name: lab_id
          in: path
          required: true
          schema:
            type: integer
          description: 实验室ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabUpdate'
      responses:
        '200':
          description: 更新成功
        '404':
          description: 实验室不存在
    delete:
      summary: 删除实验室
      description: 删除实验室（管理员专用，软删除）
      tags:
        - Lab
      security:
        - CookieAuth: []
      parameters:
        - name: lab_id
          in: path
          required: true
          schema:
            type: integer
          description: 实验室ID
      responses:
        '200':
          description: 删除成功
        '404':
          description: 实验室不存在

  /api/v1/labs/{lab_id}/managers:
    get:
      summary: 获取实验室负责人列表
      description: 获取实验室的所有负责人
      tags:
        - Lab
      security:
        - CookieAuth: []
      parameters:
        - name: lab_id
          in: path
          required: true
          schema:
            type: integer
          description: 实验室ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  - id: 1
                    user_id: 5
                    name: 李四
                    phone: "13900139000"
    post:
      summary: 添加实验室负责人
      description: 为实验室添加负责人（管理员专用）
      tags:
        - Lab
      security:
        - CookieAuth: []
      parameters:
        - name: lab_id
          in: path
          required: true
          schema:
            type: integer
          description: 实验室ID
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      responses:
        '200':
          description: 添加成功
        '400':
          description: 该用户已是实验室负责人
        '404':
          description: 实验室或用户不存在
    delete:
      summary: 移除实验室负责人
      description: 移除实验室负责人（管理员专用）
      tags:
        - Lab
      security:
        - CookieAuth: []
      parameters:
        - name: lab_id
          in: path
          required: true
          schema:
            type: integer
          description: 实验室ID
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      responses:
        '200':
          description: 移除成功
        '404':
          description: 该用户不是实验室负责人

  /api/v1/tags:
    get:
      summary: 获取标签列表
      description: 分页获取标签列表
      tags:
        - Tag
      security:
        - CookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  items:
                    - id: 1
                      name: 化学
                      description: 化学实验室标签
                      created_at: "2024-01-15T10:30:00Z"
                  pagination:
                    page: 1
                    page_size: 20
                    total: 10
                    total_pages: 1
    post:
      summary: 创建标签
      description: 创建新标签（管理员专用）
      tags:
        - Tag
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 50
                  description: 标签名称
                  example: 化学
                description:
                  type: string
                  maxLength: 255
                  description: 描述
      responses:
        '201':
          description: 创建成功
        '400':
          description: 标签名已存在
        '403':
          description: 权限不足

  /api/v1/tags/{tag_id}:
    get:
      summary: 获取标签详情
      description: 根据ID获取标签详情
      tags:
        - Tag
      security:
        - CookieAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: integer
          description: 标签ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  id: 1
                  name: 化学
                  description: 化学实验室标签
                  created_at: "2024-01-15T10:30:00Z"
        '404':
          description: 标签不存在
    put:
      summary: 更新标签
      description: 更新标签信息（管理员专用）
      tags:
        - Tag
      security:
        - CookieAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: integer
          description: 标签ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 50
                  description: 标签名称
                description:
                  type: string
                  maxLength: 255
                  description: 描述
      responses:
        '200':
          description: 更新成功
        '404':
          description: 标签不存在
    delete:
      summary: 删除标签
      description: 删除标签（管理员专用）
      tags:
        - Tag
      security:
        - CookieAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: integer
          description: 标签ID
      responses:
        '200':
          description: 删除成功
        '404':
          description: 标签不存在

  /api/v1/tags/{tag_id}/managers:
    get:
      summary: 获取标签负责人列表
      description: 获取标签的所有负责人
      tags:
        - Tag
      security:
        - CookieAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: integer
          description: 标签ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  - id: 1
                    user_id: 5
                    name: 李四
                    phone: "13900139000"
    post:
      summary: 添加标签负责人
      description: 为标签添加负责人（管理员专用）
      tags:
        - Tag
      security:
        - CookieAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: integer
          description: 标签ID
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      responses:
        '200':
          description: 添加成功
        '400':
          description: 该用户已是标签负责人
        '404':
          description: 标签或用户不存在
    delete:
      summary: 移除标签负责人
      description: 移除标签负责人（管理员专用）
      tags:
        - Tag
      security:
        - CookieAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: integer
          description: 标签ID
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      responses:
        '200':
          description: 移除成功
        '404':
          description: 该用户不是标签负责人

  /api/v1/instruments:
    get:
      summary: 获取仪器列表
      description: 分页获取仪器列表
      tags:
        - Instrument
      security:
        - CookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
        - name: status
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
          description: 仪器状态筛选 (0-正常, 1-维修, 2-停用)
        - name: lab_id
          in: query
          schema:
            type: integer
          description: 实验室ID筛选
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  items:
                    - id: 1
                      name: 高效液相色谱仪
                      model: Agilent 1260
                      manufacturer: Agilent
                      supplier: 上海仪器公司
                      purchase_date: "2024-01-15T00:00:00Z"
                      price: 250000.00
                      status: 0
                      lab_id: 1
                      remark: ""
                      created_at: "2024-01-15T10:30:00Z"
                      updated_at: "2024-01-15T10:30:00Z"
                  pagination:
                    page: 1
                    page_size: 20
                    total: 100
                    total_pages: 5
    post:
      summary: 创建仪器
      description: 创建新仪器（管理员专用）
      tags:
        - Instrument
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstrumentCreate'
      responses:
        '201':
          description: 创建成功
        '400':
          description: 实验室不存在
        '403':
          description: 权限不足

  /api/v1/instruments/{instrument_id}:
    get:
      summary: 获取仪器详情
      description: 根据ID获取仪器详细信息
      tags:
        - Instrument
      security:
        - CookieAuth: []
      parameters:
        - name: instrument_id
          in: path
          required: true
          schema:
            type: integer
          description: 仪器ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  id: 1
                  name: 高效液相色谱仪
                  model: Agilent 1260
                  manufacturer: Agilent
                  supplier: 上海仪器公司
                  purchase_date: "2024-01-15T00:00:00Z"
                  price: 250000.00
                  status: 0
                  lab_id: 1
                  remark: ""
                  created_at: "2024-01-15T10:30:00Z"
                  updated_at: "2024-01-15T10:30:00Z"
        '404':
          description: 仪器不存在
    put:
      summary: 更新仪器
      description: 更新仪器信息（管理员专用）
      tags:
        - Instrument
      security:
        - CookieAuth: []
      parameters:
        - name: instrument_id
          in: path
          required: true
          schema:
            type: integer
          description: 仪器ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstrumentUpdate'
      responses:
        '200':
          description: 更新成功
        '404':
          description: 仪器不存在
    delete:
      summary: 删除仪器
      description: 删除仪器（管理员专用，软删除）
      tags:
        - Instrument
      security:
        - CookieAuth: []
      parameters:
        - name: instrument_id
          in: path
          required: true
          schema:
            type: integer
          description: 仪器ID
      responses:
        '200':
          description: 删除成功
        '404':
          description: 仪器不存在

  /api/v1/reservations:
    get:
      summary: 获取预约列表
      description: 获取预约列表（管理员查看全部，普通用户查看自己的）
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
        - name: status
          in: query
          schema:
            type: integer
            enum: [0, 1, 2, 3]
          description: 状态筛选 (0-审批中, 1-通过, 2-拒绝, 3-已取消)
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  items:
                    - id: 1
                      user_id: 3
                      user_name: 张三
                      lab_id: 1
                      lab_name: 化学实验室A
                      start_time: "2024-01-20T09:00:00Z"
                      end_time: "2024-01-20T12:00:00Z"
                      purpose: 实验教学
                      status: 0
                      current_level: 1
                      created_at: "2024-01-15T10:30:00Z"
                  pagination:
                    page: 1
                    page_size: 20
                    total: 50
                    total_pages: 3
    post:
      summary: 创建预约
      description: 创建新预约申请
      tags:
        - Reservation
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - lab_id
                - start_time
                - end_time
              properties:
                lab_id:
                  type: integer
                  description: 实验室ID
                  example: 1
                start_time:
                  type: string
                  format: date-time
                  description: 开始时间
                  example: "2024-01-20T09:00:00Z"
                end_time:
                  type: string
                  format: date-time
                  description: 结束时间
                  example: "2024-01-20T12:00:00Z"
                purpose:
                  type: string
                  description: 使用目的
                  example: 实验教学
      responses:
        '201':
          description: 预约提交成功
          content:
            application/json:
              example:
                code: 201
                message: 预约提交成功，等待审批
                data:
                  id: 1
                  lab_id: 1
                  lab_name: 化学实验室A
                  start_time: "2024-01-20T09:00:00Z"
                  end_time: "2024-01-20T12:00:00Z"
                  purpose: 实验教学
                  status: 0
        '400':
          description: 创建失败
          content:
            application/json:
              example:
                code: 400
                message: 该时间段已被预约
                data: null

  /api/v1/reservations/{reservation_id}:
    get:
      summary: 获取预约详情
      description: 获取预约详情（本人或管理员）
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  id: 1
                  user_id: 3
                  user_name: 张三
                  lab_id: 1
                  lab_name: 化学实验室A
                  start_time: "2024-01-20T09:00:00Z"
                  end_time: "2024-01-20T12:00:00Z"
                  purpose: 实验教学
                  status: 0
                  current_level: 1
                  created_at: "2024-01-15T10:30:00Z"
                  updated_at: "2024-01-15T10:30:00Z"
        '404':
          description: 预约不存在
        '403':
          description: 无权查看
    put:
      summary: 更新预约
      description: 更新预约内容（仅限审批中的预约，本人可操作）
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start_time:
                  type: string
                  format: date-time
                  description: 开始时间
                end_time:
                  type: string
                  format: date-time
                  description: 结束时间
                purpose:
                  type: string
                  description: 使用目的
      responses:
        '200':
          description: 更新成功
        '400':
          description: 更新失败
        '403':
          description: 无权操作
    delete:
      summary: 取消预约
      description: 取消预约（本人或管理员）
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      responses:
        '200':
          description: 取消成功
        '400':
          description: 当前状态无法取消

  /api/v1/reservations/{reservation_id}/reapply:
    put:
      summary: 重新申请
      description: 被拒绝后修改并重新提交预约
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - start_time
                - end_time
              properties:
                start_time:
                  type: string
                  format: date-time
                  description: 开始时间
                end_time:
                  type: string
                  format: date-time
                  description: 结束时间
                purpose:
                  type: string
                  description: 使用目的
      responses:
        '200':
          description: 重新申请成功
        '400':
          description: 只有被拒绝的预约才能重新申请

  /api/v1/approvals/pending:
    get:
      summary: 获取待我审批的预约
