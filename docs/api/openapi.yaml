  /api/v1/approvals/reservations/{reservation_id}/approve:
    post:
      summary: 审批通过
      description: 审批通过预约（一级或二级审批人）
      tags:
        - Approval
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
        - name: level
          in: query
          required: true
          schema:
            type: integer
            enum: [1, 2]
          description: 审批级别 (1-一级审批, 2-二级审批)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: 审批意见
      responses:
        '200':
          description: 审批通过
          content:
            application/json:
              example:
                code: 200
                message: 审批通过
                data:
                  id: 1
                  status: 0
                  current_level: 2
        '400':
          description: 审批失败
          content:
            application/json:
              example:
                code: 400
                message: 您不是该实验室的负责人
                data: null

  /api/v1/approvals/reservations/{reservation_id}/reject:
    post:
      summary: 审批拒绝
      description: 拒绝预约（一级或二级审批人）
      tags:
        - Approval
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
