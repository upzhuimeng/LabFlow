# API Documentation Template
# 使用 OpenAPI 3.0 YAML 格式
# 模板文件，实际接口在具体模块文档中

openapi: 3.0.3
info:
  title: LabFlow API
  description: 实验室管理系统 API
  version: 1.0.0
  contact:
    name: LabFlow Team

servers:
  - url: http://localhost:8000
    description: Development Server

paths:
  # 示例模板 - 实际接口在具体模块文档中
  /example:
    get:
      summary: 获取列表
      description: 获取资源列表
      tags:
        - Example
      parameters:
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleListResponse'
              example:
                code: 200
                message: success
                data:
                  items: []
                  total: 0
                  page: 1
                  page_size: 10
        '401':
          description: 未认证
          content:
            application/json:
              example:
                code: 401
                message: Unauthorized
                data: null

    post:
      summary: 创建资源
      description: 创建新资源
      tags:
        - Example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExampleCreate'
            example:
              name: ""
              description: ""
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleResponse'

components:
  schemas:
    ExampleCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
          description: 名称
        description:
          type: string
          maxLength: 255
          description: 描述
          default: ""

    ExampleResponse:
      type: object
      properties:
        id:
          type: integer
          description: ID
        name:
          type: string
          description: 名称
        description:
          type: string
          description: 描述
        created_at:
          type: string
          format: date-time
          description: 创建时间

    ExampleListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExampleResponse'
        total:
          type: integer
          description: 总数
        page:
          type: integer
          description: 当前页
        page_size:
          type: integer
          description: 每页数量

tags:
  - name: Example
    description: 示例接口
