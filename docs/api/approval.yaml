openapi: 3.0.3
info:
  title: Approval API
  description: 审批管理接口
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Development Server

paths:
  /api/v1/approvals/pending:
    get:
      summary: 获取待我审批的预约
      description: 获取当前用户需要审批的预约列表（一级和二级）
      tags:
        - Approval
      security:
        - CookieAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  level1_pending:
                    - id: 1
                      user_name: 张三
                      lab_id: 1
                      lab_name: 化学实验室A
                      start_time: "2024-01-20T09:00:00Z"
                      end_time: "2024-01-20T12:00:00Z"
                      purpose: 实验教学
                      created_at: "2024-01-15T10:30:00Z"
                  level2_pending:
                    - id: 2
                      user_name: 李四
                      lab_id: 2
                      lab_name: 物理实验室B
                      start_time: "2024-01-21T14:00:00Z"
                      end_time: "2024-01-21T17:00:00Z"
                      purpose: 科研实验
                      created_at: "2024-01-16T11:00:00Z"

  /api/v1/approvals/reservations/{reservation_id}/approve:
    post:
      summary: 审批通过
      description: 审批通过预约（一级或二级审批人）
      tags:
        - Approval
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
        - name: level
          in: query
          required: true
          schema:
            type: integer
            enum: [1, 2]
          description: 审批级别 (1-一级审批, 2-二级审批)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: 审批意见
      responses:
        '200':
          description: 审批通过
          content:
            application/json:
              example:
                code: 200
                message: 审批通过
                data:
                  id: 1
                  status: 0
                  current_level: 2
        '400':
          description: 审批失败
          content:
            application/json:
              example:
                code: 400
                message: 您不是该实验室的负责人
                data: null

  /api/v1/approvals/reservations/{reservation_id}/reject:
    post:
      summary: 审批拒绝
      description: 拒绝预约（一级或二级审批人）
      tags:
        - Approval
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
        - name: level
          in: query
          required: true
          schema:
            type: integer
            enum: [1, 2]
          description: 审批级别 (1-一级审批, 2-二级审批)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: 拒绝原因
      responses:
        '200':
          description: 已拒绝
          content:
            application/json:
              example:
                code: 200
                message: 已拒绝
                data:
                  id: 1
                  status: 2
                  current_level: 1
        '400':
          description: 操作失败

  /api/v1/approvals/reservations/{reservation_id}:
    get:
      summary: 获取预约的审批记录
      description: 获取指定预约的所有审批记录
      tags:
        - Approval
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  - id: 1
                    reservation_id: 1
                    approver_id: 5
                    approver_name: 王五
                    level: 1
                    status: 0
                    comment: 同意使用
                    approved_at: "2024-01-16T09:00:00Z"
                    created_at: "2024-01-16T08:30:00Z"
                  - id: 2
                    reservation_id: 1
                    approver_id: 6
                    approver_name: 赵六
                    level: 2
                    status: 0
                    comment: 实验室可用
                    approved_at: "2024-01-16T10:00:00Z"
                    created_at: "2024-01-16T09:30:00Z"

components:
  schemas:
    ApprovalResponse:
      type: object
      properties:
        id:
          type: integer
          description: 审批记录ID
        reservation_id:
          type: integer
          description: 预约ID
        approver_id:
          type: integer
          description: 审批人ID
        approver_name:
          type: string
          description: 审批人姓名
        level:
          type: integer
          enum: [1, 2]
          description: 审批级别
        status:
          type: integer
          enum: [0, 1]
          description: 状态 (0-通过, 1-拒绝)
        comment:
          type: string
          description: 审批意见
        approved_at:
          type: string
          format: date-time
          description: 审批时间
        created_at:
          type: string
          format: date-time
          description: 创建时间

tags:
  - name: Approval
    description: 审批管理接口
