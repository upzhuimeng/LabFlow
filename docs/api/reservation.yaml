openapi: 3.0.3
info:
  title: Reservation API
  description: 预约管理接口
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Development Server

paths:
  /api/v1/reservations:
    get:
      summary: 获取预约列表
      description: 获取预约列表（管理员查看全部，普通用户查看自己的）
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
        - name: status
          in: query
          schema:
            type: integer
            enum: [0, 1, 2, 3]
          description: 状态筛选 (0-审批中, 1-通过, 2-拒绝, 3-已取消)
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  items:
                    - id: 1
                      user_id: 3
                      user_name: 张三
                      lab_id: 1
                      lab_name: 化学实验室A
                      start_time: "2024-01-20T09:00:00Z"
                      end_time: "2024-01-20T12:00:00Z"
                      purpose: 实验教学
                      status: 0
                      current_level: 1
                      created_at: "2024-01-15T10:30:00Z"
                  pagination:
                    page: 1
                    page_size: 20
                    total: 50
                    total_pages: 3

    post:
      summary: 创建预约
      description: 创建新预约申请
      tags:
        - Reservation
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - lab_id
                - start_time
                - end_time
              properties:
                lab_id:
                  type: integer
                  description: 实验室ID
                  example: 1
                start_time:
                  type: string
                  format: date-time
                  description: 开始时间
                  example: "2024-01-20T09:00:00Z"
                end_time:
                  type: string
                  format: date-time
                  description: 结束时间
                  example: "2024-01-20T12:00:00Z"
                purpose:
                  type: string
                  description: 使用目的
                  example: 实验教学
      responses:
        '201':
          description: 预约提交成功
          content:
            application/json:
              example:
                code: 201
                message: 预约提交成功，等待审批
                data:
                  id: 1
                  lab_id: 1
                  lab_name: 化学实验室A
                  start_time: "2024-01-20T09:00:00Z"
                  end_time: "2024-01-20T12:00:00Z"
                  purpose: 实验教学
                  status: 0
        '400':
          description: 创建失败
          content:
            application/json:
              example:
                code: 400
                message: 该时间段已被预约
                data: null

  /api/v1/reservations/{reservation_id}:
    get:
      summary: 获取预约详情
      description: 获取预约详情（本人或管理员）
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 200
                message: success
                data:
                  id: 1
                  user_id: 3
                  user_name: 张三
                  lab_id: 1
                  lab_name: 化学实验室A
                  start_time: "2024-01-20T09:00:00Z"
                  end_time: "2024-01-20T12:00:00Z"
                  purpose: 实验教学
                  status: 0
                  current_level: 1
                  created_at: "2024-01-15T10:30:00Z"
                  updated_at: "2024-01-15T10:30:00Z"
        '404':
          description: 预约不存在
        '403':
          description: 无权查看

    put:
      summary: 更新预约
      description: 更新预约内容（仅限审批中的预约，本人可操作）
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start_time:
                  type: string
                  format: date-time
                  description: 开始时间
                end_time:
                  type: string
                  format: date-time
                  description: 结束时间
                purpose:
                  type: string
                  description: 使用目的
      responses:
        '200':
          description: 更新成功
        '400':
          description: 更新失败
        '403':
          description: 无权操作

    delete:
      summary: 取消预约
      description: 取消预约（本人或管理员）
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      responses:
        '200':
          description: 取消成功
        '400':
          description: 当前状态无法取消

  /api/v1/reservations/{reservation_id}/reapply:
    put:
      summary: 重新申请
      description: 被拒绝后修改并重新提交预约
      tags:
        - Reservation
      security:
        - CookieAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: integer
          description: 预约ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - start_time
                - end_time
              properties:
                start_time:
                  type: string
                  format: date-time
                  description: 开始时间
                end_time:
                  type: string
                  format: date-time
                  description: 结束时间
                purpose:
                  type: string
                  description: 使用目的
      responses:
        '200':
          description: 重新申请成功
        '400':
          description: 只有被拒绝的预约才能重新申请

components:
  schemas:
    ReservationResponse:
      type: object
      properties:
        id:
          type: integer
          description: 预约ID
        user_id:
          type: integer
          description: 申请人ID
        user_name:
          type: string
          description: 申请人姓名
        lab_id:
          type: integer
          description: 实验室ID
        lab_name:
          type: string
          description: 实验室名称
        start_time:
          type: string
          format: date-time
          description: 开始时间
        end_time:
          type: string
          format: date-time
          description: 结束时间
        purpose:
          type: string
          description: 使用目的
        status:
          type: integer
          enum: [0, 1, 2, 3]
          description: 状态 (0-审批中, 1-通过, 2-拒绝, 3-已取消)
        current_level:
          type: integer
          enum: [0, 1, 2, 3]
          description: 当前审批阶段 (0-未申请, 1-一级审批中, 2-二级审批中, 3-全部通过)
        created_at:
          type: string
          format: date-time
          description: 创建时间
        updated_at:
          type: string
          format: date-time
          description: 更新时间

tags:
  - name: Reservation
    description: 预约管理接口
