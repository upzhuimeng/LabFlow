openapi: 3.0.3
info:
  title: Auth API
  description: 认证接口（登录/注册/登出）
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Development Server

paths:
  /api/v1/auth/login:
    post:
      summary: 用户登录
      description: 支持手机号或邮箱登录
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                phone:
                  type: string
                  description: 手机号（11位数字）
                  example: "13800138000"
                email:
                  type: string
                  description: 邮箱
                  example: "user@example.com"
                password:
                  type: string
                  description: 密码
                  example: "Password123!"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        description: JWT Token
                      token_type:
                        type: string
                        example: bearer
              example:
                code: 200
                message: success
                data:
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  token_type: bearer
        '400':
          description: 参数错误
          content:
            application/json:
              example:
                code: 400
                message: 请提供手机号或邮箱
                data: null

  /api/v1/auth/register:
    post:
      summary: 用户注册
      description: 注册新用户
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - phone
                - password
              properties:
                name:
                  type: string
                  maxLength: 30
                  description: 用户名（真实姓名）
                  example: 张三
                phone:
                  type: string
                  description: 手机号（11位数字）
                  example: "13800138000"
                email:
                  type: string
                  description: 邮箱（可选）
                  example: "user@example.com"
                password:
                  type: string
                  description: 密码（8-30位，需包含符号+字母+数字）
                  example: "Password123!"
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      token_type:
                        type: string
              example:
                code: 201
                message: success
                data:
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  token_type: bearer
        '400':
          description: 注册失败
          content:
            application/json:
              example:
                code: 400
                message: 该手机号已注册
                data: null

  /api/v1/auth/logout:
    post:
      summary: 用户登出
      description: 清除登录Cookie
      tags:
        - Auth
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              example:
                code: 200
                message: 已退出登录
                data: null

components:
  schemas:
    LoginRequest:
      type: object
      properties:
        phone:
          type: string
          description: 手机号
        email:
          type: string
          description: 邮箱
        password:
          type: string
      required:
        - password

tags:
  - name: Auth
    description: 认证接口
