# LabFlow 生产环境 Nginx 配置
# 前端: Next.js (通过 Unix socket 或 端口)
# 后端: FastAPI (通过 Unix socket 或 端口)

upstream frontend {
    server 127.0.0.1:3000;
    # 或使用 Unix socket:
    # server unix:/var/run/labflow/frontend.sock;
}

upstream backend {
    server 127.0.0.1:8000;
    # 或使用 Unix socket:
    # server unix:/var/run/labflow/backend.sock;
}

# HTTP -> HTTPS 重定向 (可选，取消注释启用)
# server {
#     listen 80;
#     server_name labflow.example.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 443 ssl http2;
    server_name labflow.example.com;

    # SSL 配置 (根据实际情况修改证书路径)
    ssl_certificate /etc/ssl/certs/labflow.crt;
    ssl_certificate_key /etc/ssl/private/labflow.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 前端 (Next.js)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Forwarded-Host $host;
    }

    # 后端 API (FastAPI)
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie 透传
        proxy_pass_header Set-Cookie;

        # 超时设置
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Swagger UI 文档
    location /docs {
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 日志
    access_log /var/log/nginx/labflow_access.log;
    error_log /var/log/nginx/labflow_error.log;
}

# HTTP -> HTTPS (可选)
